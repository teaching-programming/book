project:
    type: book
    output-dir: _book/
    render:
      - "*.qmd"
    pre-render: touch .nojekyll
    post-render: rm ./.nojekyll

execute:
    freeze: auto

format:
    html:
        number-sections: false
        eval: true
        theme: [cosmo, _theme/atkinson.scss]
        css: _theme/styles.css
        code-line-numbers: true
        code-block-bg: true
        code-block-border-left: true

        repo-url: https://github.com/teaching-programming/book
        site-url: https://teaching-programming.github.io/book
        link-external-newwindow: true

        csl: apa-6th-edition.csl

        toc: true
        include-before-body:
            file: _theme/accessibility.html
        grid:
            sidebar-width: 400px
            body-width: 900px
            margin-width: 330px
            gutter-width: 30px
    # pdf:
        # include-in-header: _theme/latex_preamble.tex
        # bibliography: references.bib
        # links-as-notes: true
        
    docx:
#     temp dev note: in terminal use: quarto render --to docx
        reference-doc: _theme/book-layout-test2.7-ref.docx
        number-sections: false
        bibliography: references.bib
        eval: true
        code-line-numbers: true
        code-block-bg: true
        code-block-border-left: true
        repo-url: https://github.com/teaching-programming/book
        toc: true
        toc-depth: 1
        links-as-notes: true
        fig-width: 2
        fig-height: 2
        width: 1
        height: 1
        papersize: a4
        margin-left: 0cm
        margin-right: 0cm
        margin-top: 0cm
        margin-bottom: 0cm
        fig-align: center 
        filters:
          - _theme/filters/callout-for-docx.lua
          - _theme/filters/authors-for-docx.lua
    # epub:
        # bibliography: references.bib

book:
    title: "Teaching Programming Across Disciplines"

    page-navigation: true
    sidebar:
        style: "docked"
        search: true
        collapse-level: 1

        tools:
          - icon: download
            menu:
              - text: Download PDF
                href: TODO_ADD_PDF_URL_FROM_ED

    margin-header: _theme/_accessibility_sidebar.qmd

    output-file: teaching_programming_across_disciplines

    chapters:
        - index.qmd
        - C00.0_book_copyright_page.qmd
        - C00.1_dedication.qmd
        - C00.2_this_book.qmd
        - C00.3_all_parts_introduction.qmd
        
        - part: "=== Part I — Theories and Applications of Teaching Programming"
        - text: "Introduction to Part I"
          file: P01_part-theories-applications.qmd
        - part: "Theme — Pair Programming: What? How? Why?"
        - C12_pair-programming-overview.qmd
        - C36_pair-programming-across-disciplines.qmd
        - C41_pair-programming-tutor-reflections.qmd
        - part: "Theme — Building Healthy Programming Habits"
        - C09_debugging-beyond-the-debugger.qmd
        - C05_coding-mindset.qmd
