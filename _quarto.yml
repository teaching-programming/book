        - C10_teaching-with-genai.qmd
        - C44_ai-voice-and-style-in-programming-education.qmd
        - C21_programming-across-disciplines-systems-thinking.qmd
        - part: "Theme — Teaching Programming Courses: What Worked for Us"
        - C04_computer-says-no.qmd
        - C14_foster-inclusion-and-accessibility.qmd
